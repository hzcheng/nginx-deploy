services:
  npm:
    image: jc21/nginx-proxy-manager:${NPM_IMAGE_TAG:-latest}
    container_name: npm
    restart: unless-stopped
    network_mode: service:tailscale
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      - ../certbot/conf:/certs:ro
    depends_on:
      - tailscale
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:81/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
