services:
  derper:
    build:
      context: .
      args:
        - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
    container_name: derper
    restart: unless-stopped
    network_mode: service:tailscale
    profiles:
      - derper
    environment:
      - DERP_HOSTNAME=${DERP_DOMAIN:-}
      - DERP_HTTP_PORT=${DERP_HTTP_PORT:-8080}
    command: >
      /bin/sh -c 'if [ -z "$${DERP_HOSTNAME}" ]; then echo "ERROR: DERP_DOMAIN is not set in .env" && exit 1; fi && echo "Starting derper on HTTP port $${DERP_HTTP_PORT}..." && derper -hostname $${DERP_HOSTNAME} -a :$${DERP_HTTP_PORT} -stun -stun-port ${DERP_STUN_PORT:-3478}'
    depends_on:
      - tailscale
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${DERP_HTTP_PORT:-8080}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
